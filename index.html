// Integrated from planner:

// persistence for duration presets per exercise (minutes only)
const presetKey = 'workoutDurations';
function loadPresets(){
    try { return JSON.parse(localStorage.getItem(presetKey)) || {}; }
    catch(e){ return {}; }
}
function savePresets(obj){
    try { localStorage.setItem(presetKey,JSON.stringify(obj)) }
    catch(e){ console.warn('could not save presets',e); }
}
const presets = loadPresets();


// ===== Simple Timer =====
class Timer {
    constructor(displayElem, labelElem) {
        this.display = displayElem;
        this.labelElem = labelElem;
        this.duration = 60; // default seconds
        this.remaining = this.duration;
        this.interval = null;
        this.currentLabel = "Timer";
        this.onFinish = null; // called when countdown reaches zero
        this.update();
    }

    format(t) {
        const m = Math.floor(t / 60).toString().padStart(2, '0');
        const s = (t % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    update() {

        this.display.textContent = this.format(this.remaining);
        this.labelElem.textContent = this.currentLabel;
        if (this.progressFill) {
            const pct = this.duration > 0 ? ((this.duration - this.remaining) / this.duration) * 100 : 0;
            this.progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
        }
        updateEndTimeDisplay();        
    }

    start() {
        if (this.interval) return;

        this.interval = setInterval(() => {

            if (this.remaining === 11) {
                alertSound.play().catch(()=>{});
            }
            if (this.remaining <= 0) {
                this.pause();
                if (typeof this.onFinish === 'function') {
                    this.onFinish();
                }
                return;
            }
            this.remaining -= 1;
            this.update();
            
            if(currentLi){currentLi.dataset.goneSeconds = Number(currentLi.dataset.goneSeconds) + 1; updateBar(currentLi)} // testing

            if(currentLi.classList.contains("done")){ currentCheck.click()}

        }, 1000);

        // if sound was playing before, resume it when timer starts again
        if (SoundWasPlaying) {
            alertSound.play().catch(()=>{});
            SoundWasPlaying = false;
        }
    }

    pause() {
        if (this.interval) {
            clearInterval(this.interval);
            this.interval = null;
        }
        if (!alertSound.paused) {
            SoundWasPlaying = true;
            alertSound.pause();
        } else {
            SoundWasPlaying = false;
        }
    }

    reset(newTime) {
        this.pause();

        if (newTime !== undefined){
            this.duration = newTime;
        }
        this.remaining = this.duration;
        this.update();
        
        if (currentCheck.getAttribute("aria-pressed") === "true"){
            currentCheck.click();
        }
    }

    setDuration(seconds) {
        this.duration = Math.max(0, Math.floor(seconds));
        this.remaining = this.duration;
        this.update();
    }

    setLabel(text) {
        this.currentLabel = text || "Timer";
        this.update();
    }
}

const timeDisplay = document.getElementById('timeDisplay');
const timerLabel = document.getElementById('timerLabel');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const timer = new Timer(timeDisplay, timerLabel);
// attach progress fill element to timer for visual progress updates
const timerProgressFill = document.getElementById('timerProgressFill');
timer.progressFill = timerProgressFill;
const timerContainer = document.getElementById('timer');


// when timer completes, tick the current exercise if not already done
let currentCheck = null;
let currentLi = null;
timer.onFinish = () => {
    if (currentCheck && currentCheck.getAttribute('aria-pressed') === 'false') {

    }
};

startBtn.addEventListener('click', () => timer.start());
pauseBtn.addEventListener('click', () => timer.pause());
resetBtn.addEventListener('click', () => {

    /*if (currentLi) {
        currentLi.classList.remove('current');
        currentLi = null;
    }
    currentCheck = null;*/

});

//Helper function: time format and updating
function updateDisplay(){
  display.textContent = formatTime(currentTime);
}

//Helper function: safe positioning (no off-screen)
function positionEditor(target){

  const rect = target.getBoundingClientRect();

  const editorWidth = editor.offsetWidth || 200;
  const editorHeight = editor.offsetHeight || 200;

  let left = rect.right + 8;
  let top = rect.top;

  // prevent right overflow
  if(left + editorWidth > window.innerWidth){
    left = rect.left - editorWidth - 8;
  }

  // prevent bottom overflow
  if(top + editorHeight > window.innerHeight){
    top = window.innerHeight - editorHeight - 8;
  }

  // prevent top overflow
  if(top < 8){
    top = 8;
  }

  editor.style.left = left + "px";
  editor.style.top = top + "px";

}

const display = editor.querySelector(".editor-display");

//Keypad:cancel
document.getElementById("timeCancel").onclick = ()=>{
  editor.classList.add("hidden");
};



function getIndex(li) {
    return Array.from(li.parentNode.children).indexOf(li);
}

function reorderList(list, option, index, targetIndex = null) {

    const items = list.children;

    if (option === "one-up") {
        //console.log("'one-up'", index)
        if (index <= 0) return;

        const item = items[index];
        const prev = items[index - 1];

        //console.log("item:",item,"prev:",prev)
        list.insertBefore(item, prev);
    }

    else if (option === "one-down") {
        if (index >= items.length - 1) return;

        const item = items[index];
        const next = items[index + 1];

        list.insertBefore(next, item);
    }

    else if (option === "dragging") {
        if (targetIndex === null || targetIndex === index) return;

        const item = items[index];
        const target = items[targetIndex];

        if (index < targetIndex) {
            list.insertBefore(item, target.nextSibling);
        } else {
            list.insertBefore(item, target);
        }
    }
}



// helper to redraw list based on displayItems
function renderList(){
    list.innerHTML = '';
    displayItems.forEach((item,index) => {
        const li = document.createElement("li");
        //li.setAttribute('data-order', index);
        li.tabIndex = 0;

        /*TESTING COLORS AND TYPES*/
        if (item.targets && item.targets.includes("Drills")){li.className = "drill"}
        else{ li.className = item.type || "";}
        item = item.name || item;

        li.draggable = false; // only handle will be draggable
        // drag handle (will be appended to right controls so checkbox/label stay flush left)
        const handle = document.createElement('span');
        handle.draggable = true;
        handle.className = 'drag-handle';
        handle.textContent = '☰';
        handle.title = 'Drag to reorder';
        handle.addEventListener('mousedown', e=> e.stopPropagation());
        let draggedIndex=null;
        
        handle.addEventListener('dragstart', () => {
            handle.closest("li").classList.add("dragging");
        });

        handle.addEventListener("dragend", () => {
            document.querySelectorAll(".dragging")
                .forEach(el => el.classList.remove("dragging"));
        });

        list.addEventListener('dragover', (e) => {

            e.preventDefault();

            const targetLi = e.target.closest("li");
            const draggingEl = document.querySelector(".dragging");

            if (!targetLi || !draggingEl || targetLi === draggingEl) return;

            const rect = targetLi.getBoundingClientRect();
            const offset = e.clientY - rect.top;

            if (offset > rect.height / 2) {
                list.insertBefore(draggingEl, targetLi.nextSibling);
            } else {
                list.insertBefore(draggingEl, targetLi);
            }

        });


        // left group: check button + label
        const left = document.createElement('div');
        left.className = 'item-left';
        left.style.display = 'flex';
        left.style.alignItems = 'center';
        left.title = 'Click to start timer';

        const checkBtn = document.createElement('button');
        checkBtn.className = 'check-circle';
        checkBtn.setAttribute('aria-pressed', 'false');
        checkBtn.setAttribute('aria-label', `Mark ${item} done`);
        checkBtn.title = `Mark completed`;

        const label = document.createElement('span');
        label.className = 'exercise-label';
        label.textContent = item;
        li.id=label.textContent

        // custom duration input (seconds)
        const timeInput = document.createElement('input');

        timeInput.type = 'text';           // better for custom formatting
        timeInput.readOnly = true;
        timeInput.className = 'time-input';

        timeInput.id = label.textContent + "-input"; //TESTING

        timeInput.dataset.seconds = "60";  // store actual value
        timeInput.value = "01:00";         // visible time

        timeInput.title = 'duration';
        li.dataset.seconds=0;
        li.dataset.goneSeconds=0;//console.log("remaining seconds reset.")

        //timeInput.addEventListener('click', e => e.stopPropagation());
        //timeInput.addEventListener('keydown', e => e.stopPropagation());

        // handle presets (minutes only)
        const applyPreset = () => {
            const p = presets[item];
            if(p){
                timeInput.value = formatTime(p.value);
                timeInput.dataset.seconds = p.value
            }
        };

        left.appendChild(checkBtn);
        left.appendChild(label);
        applyPreset();
        //sessionStorage.setItem("TESTING!!!", 203040);

        // right group: time selectors and controls
        const right = document.createElement('div');
        right.className = 'item-right';

        // up/down buttons (small)
        const controls = document.createElement('div');
        controls.style.display = 'flex';
        controls.style.flexDirection = 'column';
        controls.style.gap = '4px';

        const upBtn = document.createElement('button');
        upBtn.className = 'small-arrow';
        upBtn.textContent = '▲';
        upBtn.title = 'Move up';
        upBtn.addEventListener('click', e=>{
            e.stopPropagation();
            const clickedIndex = getIndex(document.getElementById(item))
            if(clickedIndex>0){
                
                reorderList(list, "one-up", clickedIndex)
            }
        });
        const downBtn = document.createElement('button');
        downBtn.className = 'small-arrow';
        downBtn.textContent = '▼';
        downBtn.title = 'Move down';
        downBtn.addEventListener('click', e=>{
            e.stopPropagation();
            const clickedIndex = getIndex(document.getElementById(item))

            if(clickedIndex<displayItems.length-1){
                reorderList(list, "one-down", clickedIndex)
            }
        });
        controls.appendChild(upBtn);
        controls.appendChild(downBtn);

        // place time input in right group
        right.appendChild(timeInput);
        // append drag handle into right so left content stays flush-left
        right.appendChild(handle);
        right.appendChild(controls);

        // progress bar for each exercise
        const progressBar = document.createElement('div')
        progressBar.className = 'progressBar'

        // assemble: left (text) + right (selectors/controls)
        li.appendChild(left);
        li.appendChild(right);
        li.appendChild(progressBar);
        // li.dataset.goneSeconds = 0; console.log("set to 0")

        // toggle done
        checkBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isDone = li.classList.toggle('done');
            checkBtn.setAttribute('aria-pressed', isDone);
            if (isDone && currentCheck === checkBtn) {
                //TESTING currentCheck = null;
            }
            // if item marked done, remove current highlight
            if (isDone && li.classList.contains('current')) {
                //TESTING li.classList.remove('current');
                //TESTING if (currentLi === li) currentLi = null;
                if (currentLi === li) timer.pause();
            }
            updateEndTimeDisplay();
            updateGeneralBar();
        });

        // click starts timer  !!!Updated: only left starts timer
        left.addEventListener('click', () => {
            //previous: let seconds = (parseInt(timeInput.value, 10) || 1) * 60;
            //new:
            const seconds = parseInt(timeInput.dataset.seconds) - Number(li.dataset.goneSeconds)
            // reveal timer when an exercise is selected
            if (timerContainer) timerContainer.style.display = 'flex';
            timer.setLabel(item);
            timer.setDuration(seconds);
            // clear previous current highlight
            if (currentLi && currentLi !== li) {
                currentLi.classList.remove('current');
            }
            li.classList.add('current');
            currentLi = li;
            currentCheck = checkBtn;

            //TESTING: uncheck checked item if it is clicked
            timer.reset();
            timer.start();
        });

        list.appendChild(li);
    });

    updateEndTimeDisplay();
}

    return date.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });
}

    let remainingSeconds = sumUncheckedDurations(list);

    document.getElementById("endTime").textContent =
        (Math.ceil(remainingSeconds/60)) +" min left"

    //document.addEventListener("click", () => console.log(remainingSeconds))
}
